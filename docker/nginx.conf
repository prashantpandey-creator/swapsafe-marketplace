server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Reverse proxy: browser hits /api/*, nginx forwards to backend container.
    # Variable-based proxy_pass forces nginx to re-resolve on each request
    # and avoids cross-network DNS collisions with purangpt_backend.
    location /api/ {
        set $backend_host swapsafe-backend;
        proxy_pass http://$backend_host:5000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    location /ai/ {
        set $ai_host swapsafe-ai-engine;
        rewrite ^/ai/(.*) /$1 break;
        proxy_pass http://$ai_host:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # SPA: send all other routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
