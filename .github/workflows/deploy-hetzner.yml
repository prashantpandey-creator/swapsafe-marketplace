name: Deploy to Hetzner

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "ai-engine/**"
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"
      - "package.json"
      - "vite.config.js"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/swapsafe-marketplace

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart containers
            docker compose build --no-cache
            docker compose up -d

            # Cleanup old images
            docker image prune -f

            echo "SwapSafe deployed successfully"
